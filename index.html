<!DOCTYPE html>
<html>
<head>
    <title>CASHIN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>💰 CASHIN</h1>

<div class="auth">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
    <h3 id="balance">Balance: 0</h3>
</div>

<div class="game-wrapper">
    <canvas id="graph"></canvas>
    <img id="plane" src="plane.png">
</div>

<h2 id="multiplier">1.00x</h2>
<button onclick="cashOut()">CASH OUT</button>

<input id="betAmount" placeholder="Bet amount">
<button onclick="placeBet()">BET</button>

<ul id="players"></ul>

<audio id="takeoff" src="sounds/takeoff.mp3"></audio>
<audio id="flying" src="sounds/flying.mp3"></audio>
<audio id="crashSound" src="sounds/crash.mp3"></audio>
<audio id="cashSound" src="sounds/cash.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
